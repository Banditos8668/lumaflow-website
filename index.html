<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme -->
    <meta name="theme-color" content="#171717" />
    <meta name="color-scheme" content="light" />

    <!-- Primary SEO -->
    <title>LumaFlow | Stop Losing Customers Before They Book</title>
    <meta name="description" content="LumaFlow helps local businesses in Zürich get found, trusted, and booked with mobile-first websites, better Google visibility, and smarter inquiry follow-up. Get a free quick check." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lumaflow.ch/" />
    <meta property="og:title" content="LumaFlow | Stop Losing Customers Before They Book" />
    <meta property="og:description" content="Mobile-first websites, Google visibility, and booking recovery for local businesses in Zürich." />
    <meta property="og:locale" content="en_CH" />
    <meta property="og:site_name" content="LumaFlow" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- LocalBusiness Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "LumaFlow",
      "description": "Booking recovery and customer growth for local businesses in Zürich. Mobile-first websites, Google visibility, and smarter inquiry follow-up.",
      "url": "https://lumaflow.ch",
      "email": "hello@lumaflow.ch",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Zürich",
        "addressRegion": "ZH",
        "addressCountry": "CH"
      },
      "areaServed": {
        "@type": "GeoCircle",
        "geoMidpoint": {
          "@type": "GeoCoordinates",
          "latitude": 47.3769,
          "longitude": 8.5417
        },
        "geoRadius": "30000"
      },
      "serviceType": [
        "Web Design",
        "Local SEO",
        "Booking Flow Optimization",
        "Inquiry Recovery",
        "Mobile-First Website"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
