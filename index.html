<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme -->
    <meta name="theme-color" content="#171717" />

    <!-- LocalBusiness Schema -->
    <script type="application/ld+json">

        "geoMidpoint": {
          "@type": "GeoCoordinates",
          "latitude": 47.3769,
          "longitude": 8.5417
        },
        "geoRadius": "30000"
      },
      "serviceType": [
        "Web Design",
        "Local SEO",
        "Booking Flow Optimization",
        "Inquiry Recovery",
        "Mobile-First Website"
      ]
